version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: itop-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: itop
      MYSQL_USER: itop
      MYSQL_PASSWORD: itop
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  itop:
    build: .
    container_name: itop-app
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./itop/web:/var/www/html
    depends_on:
      - db

volumes:
  db_data: